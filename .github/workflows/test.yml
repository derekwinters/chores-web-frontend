name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: derekwinters/chores-web-actions/actions/setup-node@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
        with:
          node-version: ${{ matrix.node-version }}
          lockfile-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test -- --run
      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: matrix.node-version == '20.x'
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: derekwinters/chores-web-actions/actions/setup-node@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
      - name: Install dependencies
        run: npm ci
      - name: Check JS formatting
        run: npm run lint 2>/dev/null || echo "No lint script"
      - name: Lint CSS (design-token guardrail)
        run: npm run lint:css

  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: derekwinters/chores-web-actions/actions/setup-node@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
        with:
          node-version: 20.x
          lockfile-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build Storybook
        run: npm run build-storybook
      - name: Visual regression (design-token guardrail)
        run: npm run visual
      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-diffs
          path: .visual-diffs/
          if-no-files-found: ignore
          include-hidden-files: true
      # The cross-repo token gallery (chores-web-design-tokens#6) pairs these
      # PNGs with the Android Roborazzi goldens by filename.
      - name: Upload web snapshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-snapshots
          path: |
            storybook-static
            .visual-baselines
          include-hidden-files: true

  docker-build:
    needs: [tests]
    permissions:
      contents: read
      packages: write
    uses: derekwinters/chores-web-actions/.github/workflows/docker-build-push.yml@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
    with:
      context: .
      image-name: chores-web-frontend
      push: false

  composite-gallery:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      # Both platforms commit their snapshots, so the gallery needs only this
      # working tree + a public shallow clone of the android repo. The pairing
      # script lives canonically in chores-web-design-tokens (issue #6 there).
      - name: Fetch android goldens and gallery script
        run: |
          git clone --depth 1 https://github.com/derekwinters/chores-web-android /tmp/android
          curl -fsSL -o /tmp/composite-gallery.mjs https://raw.githubusercontent.com/derekwinters/chores-web-design-tokens/main/scripts/composite-gallery.mjs

      - name: Build composite gallery
        run: node /tmp/composite-gallery.mjs --web .visual-baselines --android /tmp/android/app/src/test/snapshots --out gallery/index.html

      - name: Upload gallery artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: composite-gallery
          path: gallery/index.html

      - name: Comment gallery link on themed-component changes
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -qE '^(src/.*\.(css|jsx)|\.visual-baselines/)'; then
            body="📸 Composite visual gallery (web ↔ android side by side) for this PR: download the \`composite-gallery\` artifact from this run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --edit-last --body "$body" \
              || gh pr comment "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --body "$body"
          else
            echo "No themed-component changes; skipping comment."
          fi
