name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: derekwinters/chores-web-actions/actions/setup-node@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
        with:
          node-version: ${{ matrix.node-version }}
          lockfile-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test -- --run
      - name: Upload coverage
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        if: matrix.node-version == '20.x'
        with:
          files: ./coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: derekwinters/chores-web-actions/actions/setup-node@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
      - name: Install dependencies
        run: npm ci
      - name: Check JS formatting
        run: npm run lint 2>/dev/null || echo "No lint script"
      - name: Lint CSS (design-token guardrail)
        run: npm run lint:css

  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: derekwinters/chores-web-actions/actions/setup-node@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
        with:
          node-version: 20.x
          lockfile-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build Storybook
        run: npm run build-storybook
      - name: Visual regression (design-token guardrail)
        run: npm run visual
      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-diffs
          path: .visual-diffs/
          if-no-files-found: ignore
          include-hidden-files: true
      # The cross-repo token gallery (chores-web-design-tokens#6) pairs these
      # PNGs with the Android Roborazzi goldens by filename.
      - name: Upload web snapshots
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-snapshots
          path: |
            storybook-static
            .visual-baselines
          include-hidden-files: true

  docker-build:
    needs: [tests]
    permissions:
      contents: read
      packages: write
    uses: derekwinters/chores-web-actions/.github/workflows/docker-build-push.yml@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
    with:
      context: .
      image-name: chores-web-frontend
      push: false
