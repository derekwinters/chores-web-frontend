name: Record visual baselines

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to record baselines on and push the result to
        required: true
        default: main

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: derekwinters/chores-web-actions/actions/setup-node@19729c4d6ee3366dc32f4bd8946cb8ac7f6b05e5
        with:
          node-version: 20.x
          lockfile-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build Storybook
        run: npm run build-storybook
      - name: Record baselines
        run: npm run visual:update
      - name: Commit and push updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .visual-baselines
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "test: record Storybook visual baselines [skip ci]"
            git push origin HEAD:${{ inputs.ref }}
          fi
